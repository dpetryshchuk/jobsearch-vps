<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOBSEARCH OS — Retro</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<nav>
  <div class="nav-logo">
    <span class="nav-logo-diamond"></span>
    JOBSEARCH
  </div>
  <button onclick="location.href='/'">Chat</button>
  <button class="active" onclick="location.href='/retro'">Retro</button>
  <button onclick="location.href='/pipeline'">Pipeline</button>
  <button onclick="location.href='/notes'">Notes</button>
  <span class="nav-spacer"></span>
  <button onclick="location.href='/schema'">Schema</button>
</nav>

<div class="screen active" style="overflow-y:auto;padding:68px 32px 40px;">

  <!-- This week -->
  <div class="retro-header">
    <div class="retro-title">This week</div>
    <div class="retro-date" id="retro-date"></div>
  </div>
  <div class="stats-row" id="retro-stats">
    <div class="stat"><div class="stat-label" style="color:var(--text-dim)">Loading…</div></div>
  </div>
  <div class="section-label">Funnel by source</div>
  <div class="funnel-grid" id="retro-funnel"></div>
  <div class="section-label">Needs action</div>
  <div class="action-items" id="retro-actions"></div>

  <!-- All time -->
  <div class="retro-header" style="margin-top:48px;">
    <div class="retro-title">All time</div>
    <div class="retro-date" id="alltime-since"></div>
  </div>
  <div class="stats-row" id="alltime-stats">
    <div class="stat"><div class="stat-label" style="color:var(--text-dim)">Loading…</div></div>
  </div>
  <div class="section-label">Week by week</div>
  <table id="weekly-table" style="margin-top:8px;">
    <thead>
      <tr>
        <th>Week of</th>
        <th>Sent</th>
        <th>Received</th>
        <th>Rate</th>
      </tr>
    </thead>
    <tbody id="weekly-tbody">
      <tr><td colspan="4" style="color:var(--text-dim);padding:16px;text-align:center">Loading…</td></tr>
    </tbody>
  </table>

</div>

<script>
  const BASE = window.location.hostname === 'localhost' ? 'http://localhost:4111' : '';

  document.getElementById('retro-date').textContent =
    'Week of ' + new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

  function relativeDate(dateStr) {
    const d = new Date(dateStr);
    const days = Math.floor((Date.now() - d.getTime()) / 86400000);
    if (days === 0) return 'today';
    if (days === 1) return 'yesterday';
    return days + ' days ago';
  }

  function fmtDate(dateStr) {
    return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function load() {
    const statsEl = document.getElementById('retro-stats');
    const funnelEl = document.getElementById('retro-funnel');
    const actionsEl = document.getElementById('retro-actions');
    const alltimeEl = document.getElementById('alltime-stats');
    const alltimeSinceEl = document.getElementById('alltime-since');
    const weeklyTbody = document.getElementById('weekly-tbody');

    try {
      const res = await fetch(BASE + '/data/retro');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const { stats, bySource, needsAction, alltime, weekly } = await res.json();

      // ── This week stats ────────────────────────────────────────────────────
      const sentWeek = parseInt(stats.sent_week) || 0;
      const rcvdWeek = parseInt(stats.received_week) || 0;
      const replyRate = sentWeek > 0 ? Math.round(rcvdWeek / sentWeek * 100) : 0;

      statsEl.innerHTML = `
        <div class="stat">
          <div class="stat-label">Sent out</div>
          <div class="stat-value">${sentWeek}</div>
          <div class="stat-delta">this week</div>
        </div>
        <div class="stat">
          <div class="stat-label">Replies in</div>
          <div class="stat-value">${rcvdWeek}</div>
          <div class="stat-delta">this week</div>
        </div>
        <div class="stat">
          <div class="stat-label">Reply rate</div>
          <div class="stat-value">${replyRate}%</div>
          <div class="stat-delta">${sentWeek > 0 ? rcvdWeek + ' / ' + sentWeek : 'no data'}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Active</div>
          <div class="stat-value">${stats.active}</div>
          <div class="stat-delta">of ${stats.total_contacts} contacts</div>
        </div>
      `;

      // ── Funnel by source ───────────────────────────────────────────────────
      const sourceMap = {};
      bySource.forEach(row => {
        if (!sourceMap[row.source]) sourceMap[row.source] = {};
        sourceMap[row.source][row.stage] = parseInt(row.n);
      });

      if (Object.keys(sourceMap).length === 0) {
        funnelEl.innerHTML = '<div style="color:var(--text-dim);font-size:12px;padding:8px 0">No contacts yet.</div>';
      } else {
        funnelEl.innerHTML = Object.entries(sourceMap).map(([source, stages]) => {
          const outreached = stages['Outreached'] || 0;
          const responded = stages['Responded'] || 0;
          const ongoing = stages['Ongoing'] || 0;
          const max = outreached || 1;
          return `
            <div class="funnel-cell">
              <div class="funnel-source">${escHtml(source)}</div>
              <div class="funnel-row"><span class="funnel-stage">Outreached</span><span class="funnel-count">${outreached}</span></div>
              <div class="funnel-bar"><div class="funnel-bar-fill" style="width:100%"></div></div>
              <div class="funnel-row"><span class="funnel-stage">Responded</span><span class="funnel-count">${responded}</span></div>
              <div class="funnel-bar"><div class="funnel-bar-fill" style="width:${Math.round(responded / max * 100)}%"></div></div>
              <div class="funnel-row"><span class="funnel-stage">Ongoing</span><span class="funnel-count">${ongoing}</span></div>
              <div class="funnel-bar"><div class="funnel-bar-fill" style="width:${Math.round(ongoing / max * 100)}%"></div></div>
            </div>
          `;
        }).join('');
      }

      // ── Needs action ───────────────────────────────────────────────────────
      if (needsAction.length === 0) {
        actionsEl.innerHTML = '<div style="color:var(--text-dim);font-size:12px;padding:8px 0">All caught up.</div>';
      } else {
        actionsEl.innerHTML = needsAction.map(c => `
          <div class="action-item">
            <div class="action-dot ${c.stage === 'Ongoing' ? 'urgent' : ''}"></div>
            <div class="action-name">${escHtml(c.name)}</div>
            <div class="action-company">${escHtml(c.company ?? '—')}</div>
            <div class="action-meta">${c.last_contact ? 'Last: ' + relativeDate(c.last_contact) : 'No contact logged'} — follow up</div>
          </div>
        `).join('');
      }

      // ── All time stats ─────────────────────────────────────────────────────
      const sentTotal = parseInt(alltime.sent_total) || 0;
      const rcvdTotal = parseInt(alltime.received_total) || 0;
      const rateTotal = sentTotal > 0 ? Math.round(rcvdTotal / sentTotal * 100) : 0;
      const contactsTotal = parseInt(alltime.contacts_total) || 0;
      const deadTotal = parseInt(alltime.dead_total) || 0;

      if (alltime.first_interaction) {
        alltimeSinceEl.textContent = 'Since ' + fmtDate(alltime.first_interaction);
      }

      alltimeEl.innerHTML = `
        <div class="stat">
          <div class="stat-label">Sent total</div>
          <div class="stat-value">${sentTotal}</div>
          <div class="stat-delta">all time</div>
        </div>
        <div class="stat">
          <div class="stat-label">Replies total</div>
          <div class="stat-value">${rcvdTotal}</div>
          <div class="stat-delta">all time</div>
        </div>
        <div class="stat">
          <div class="stat-label">Reply rate</div>
          <div class="stat-value">${rateTotal}%</div>
          <div class="stat-delta">${sentTotal > 0 ? rcvdTotal + ' / ' + sentTotal : 'no data'}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Contacts</div>
          <div class="stat-value">${contactsTotal}</div>
          <div class="stat-delta">${deadTotal} dead</div>
        </div>
      `;

      // ── Week by week table ─────────────────────────────────────────────────
      // Pivot flat rows (one per week+direction) into one row per week
      const weekMap = {};
      weekly.forEach(row => {
        if (!weekMap[row.week]) weekMap[row.week] = { sent: 0, received: 0 };
        if (row.direction === 'out') weekMap[row.week].sent = parseInt(row.n);
        if (row.direction === 'in') weekMap[row.week].received = parseInt(row.n);
      });

      const weeks = Object.entries(weekMap).sort((a, b) => b[0].localeCompare(a[0]));

      if (weeks.length === 0) {
        weeklyTbody.innerHTML = '<tr><td colspan="4" style="color:var(--text-dim);padding:16px;text-align:center">No interactions logged yet.</td></tr>';
      } else {
        weeklyTbody.innerHTML = weeks.map(([week, { sent, received }]) => {
          const rate = sent > 0 ? Math.round(received / sent * 100) + '%' : '—';
          return `
            <tr>
              <td>${fmtDate(week)}</td>
              <td>${sent}</td>
              <td>${received}</td>
              <td>${rate}</td>
            </tr>
          `;
        }).join('');
      }

    } catch (e) {
      statsEl.innerHTML = `<div class="stat" style="color:var(--red)">Error: ${escHtml(e.message)}</div>`;
    }
  }

  load();
</script>
</body>
</html>
