<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOBSEARCH OS — Pipeline</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<nav>
  <div class="nav-logo">
    <span class="nav-logo-diamond"></span>
    JOBSEARCH
  </div>
  <button onclick="location.href='/'">Chat</button>
  <button onclick="location.href='/retro'">Retro</button>
  <button class="active" onclick="location.href='/pipeline'">Pipeline</button>
  <button onclick="location.href='/notes'">Notes</button>
  <span class="nav-spacer"></span>
  <button onclick="location.href='/schema'">Schema</button>
</nav>

<div id="screen-pipeline" class="screen active" style="overflow-y:auto;padding:68px 32px 40px;">
  <div class="pipeline-header">
    <div class="screen-title">Pipeline</div>
  </div>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Company</th>
        <th>Role</th>
        <th>Source</th>
        <th>Stage</th>
        <th>Last contact</th>
      </tr>
    </thead>
    <tbody id="pipeline-tbody">
      <tr><td colspan="6" style="color:var(--text-dim);padding:20px;text-align:center">Loading…</td></tr>
    </tbody>
  </table>
</div>

<script>
  const BASE = window.location.hostname === 'localhost' ? 'http://localhost:4111' : '';

  function relativeDate(dateStr) {
    const d = new Date(dateStr);
    const days = Math.floor((Date.now() - d.getTime()) / 86400000);
    if (days === 0) return 'today';
    if (days === 1) return 'yesterday';
    return days + ' days ago';
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function load() {
    const tbody = document.getElementById('pipeline-tbody');
    try {
      const res = await fetch(BASE + '/data/pipeline');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const contacts = await res.json();
      if (contacts.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="color:var(--text-dim);padding:20px;text-align:center">No contacts yet — log outreach in chat.</td></tr>';
        return;
      }
      tbody.innerHTML = contacts.map(c => `
        <tr>
          <td>${escHtml(c.name)}</td>
          <td>${escHtml(c.company ?? '—')}</td>
          <td>${escHtml(c.role ?? '—')}</td>
          <td>${escHtml(c.source)}</td>
          <td><span class="stage-badge stage-${escHtml(c.stage.toLowerCase())}">${escHtml(c.stage)}</span></td>
          <td>${c.last_contact ? relativeDate(c.last_contact) : '—'}</td>
        </tr>
      `).join('');
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="6" style="color:var(--red);padding:20px;text-align:center">Error: ${escHtml(e.message)}</td></tr>`;
    }
  }

  load();
</script>
</body>
</html>
