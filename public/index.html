<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOBSEARCH OS — Chat</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<nav>
  <div class="nav-logo">
    <span class="nav-logo-diamond"></span>
    JOBSEARCH
  </div>
  <button class="active" onclick="location.href='/'">Chat</button>
  <button onclick="location.href='/retro'">Retro</button>
  <button onclick="location.href='/pipeline'">Pipeline</button>
  <button onclick="location.href='/notes'">Notes</button>
  <span class="nav-spacer"></span>
  <button onclick="location.href='/schema'">Schema</button>
</nav>

<div class="screen active" style="display:flex;flex-direction:column;overflow:hidden;">
  <div class="messages" id="messages">
    <div class="message system">
      <div class="message-tag">sys</div>
      <div class="message-body">Ready. Paste a job description, LinkedIn profile, outreach message, or anything you want logged.</div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Paste anything — job post, LinkedIn profile, message you sent..."></textarea>
      <button class="send-btn" id="send-btn">Send</button>
    </div>
    <div class="input-meta">
      <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for newline &nbsp;·&nbsp; <span id="mode-hint-text">Agent logs to database</span></div>
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-input">Input</button>
        <button class="mode-btn" id="mode-rag">RAG</button>
      </div>
    </div>
  </div>
</div>

<script>
  const BASE = window.location.hostname === 'localhost' ? 'http://localhost:4111' : '';
  const STREAM_URL = BASE + '/api/agents/jobsearch/stream';

  const input = document.getElementById('input');
  let mode = 'input';

  document.getElementById('mode-input').addEventListener('click', () => setMode('input'));
  document.getElementById('mode-rag').addEventListener('click', () => setMode('rag'));

  function setMode(m) {
    mode = m;
    document.getElementById('mode-input').classList.toggle('active', m === 'input');
    document.getElementById('mode-rag').classList.toggle('active', m === 'rag');
    document.getElementById('mode-hint-text').textContent =
      m === 'input' ? 'Agent logs to database' : 'Semantic search across notes';
    input.placeholder = m === 'input'
      ? 'Paste anything — job post, LinkedIn profile, message you sent...'
      : 'Search your notes — burnout, cold outreach, system design...';
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 200) + 'px';
  });

  document.getElementById('send-btn').addEventListener('click', send);

  const THINKING = [
    'Cogitating...', 'Ruminating...', 'Scheming...', 'Noodling...',
    'Percolating...', 'Concocting...', 'Finagling...', 'Wrangling...',
    'Deliberating...', 'Marinating...', 'Stewing...', 'Palavering...',
    'Machinating...', 'Puttering...', 'Rummaging...', 'Bamboozling...',
    'Discombobulating...', 'Festering...', 'Gallivanting...', 'Hullaballooing...',
  ];

  async function send() {
    const text = input.value.trim();
    if (!text) return;
    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';

    if (mode === 'rag') { addMessage('agent', 'RAG not yet wired.'); return; }

    const bubble = addMessage('agent', '');
    const body = bubble.querySelector('.message-body');
    const msgContainer = document.getElementById('messages');

    const thinkingEl = document.createElement('span');
    thinkingEl.className = 'thinking-word';
    thinkingEl.textContent = THINKING[Math.floor(Math.random() * THINKING.length)];
    body.appendChild(thinkingEl);
    let idx = 0;
    const ticker = setInterval(() => {
      idx = (idx + 1) % THINKING.length;
      thinkingEl.textContent = THINKING[idx];
    }, 600);

    try {
      const res = await fetch(STREAM_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: [{ role: 'user', content: text }] }),
      });

      clearInterval(ticker);
      thinkingEl.remove();
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const textDiv = document.createElement('div');
      textDiv.className = 'agent-text';
      body.appendChild(textDiv);

      const toolCallsDiv = document.createElement('div');
      toolCallsDiv.className = 'tool-calls';
      body.appendChild(toolCallsDiv);

      const cardMap = {};
      let textContent = '';
      let buffer = '';
      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split('\n\n');
        buffer = parts.pop();

        for (const part of parts) {
          const line = part.trim();
          if (!line.startsWith('data: ')) continue;
          const trimmed = line.slice(6).trim();
          if (!trimmed || trimmed === '[DONE]') continue;
          try {
            const chunk = JSON.parse(trimmed);

            if (chunk.type === 'text-delta' && chunk.payload?.text) {
              textContent += chunk.payload.text;
              textDiv.innerHTML = marked.parse(textContent);
              msgContainer.scrollTop = msgContainer.scrollHeight;
            }

            if (chunk.type === 'tool-call' && chunk.payload) {
              const p = chunk.payload;
              const card = buildToolCallCard(p.toolName, p.args, null);
              cardMap[p.toolCallId] = card;
              toolCallsDiv.appendChild(card);
              msgContainer.scrollTop = msgContainer.scrollHeight;
            }

            if (chunk.type === 'tool-result' && chunk.payload) {
              const p = chunk.payload;
              const card = cardMap[p.toolCallId];
              if (card) {
                card.querySelector('.tool-result-pre').textContent =
                  JSON.stringify(p.result, null, 2);
              }
            }
          } catch (e) { /* skip bad chunks */ }
        }
      }

      if (toolCallsDiv.children.length === 0) toolCallsDiv.remove();

    } catch (err) {
      clearInterval(ticker);
      thinkingEl.remove();
      body.textContent = `Error: ${err.message}`;
      body.style.color = 'var(--red)';
    }
  }

  function buildToolCallCard(toolName, args, result) {
    const card = document.createElement('div');
    card.className = 'tool-call';

    const header = document.createElement('div');
    header.className = 'tool-call-header';
    header.innerHTML = `<span class="tool-call-toggle">▶</span><span class="tool-call-chip">${escHtml(toolName ?? '?')}</span>`;

    const bodyEl = document.createElement('div');
    bodyEl.className = 'tool-call-body';
    bodyEl.hidden = true;
    bodyEl.innerHTML = `
      <div>
        <div class="tool-section-label">Args</div>
        <pre class="tool-json">${escHtml(JSON.stringify(args ?? null, null, 2))}</pre>
      </div>
      <div>
        <div class="tool-section-label">Result</div>
        <pre class="tool-json tool-result-pre">${escHtml(JSON.stringify(result ?? null, null, 2))}</pre>
      </div>`;

    header.addEventListener('click', () => {
      const open = !bodyEl.hidden;
      bodyEl.hidden = open;
      header.querySelector('.tool-call-toggle').classList.toggle('open', !open);
    });

    card.appendChild(header);
    card.appendChild(bodyEl);
    return card;
  }

  function addMessage(role, text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message' + (role === 'user' ? ' user' : role === 'system' ? ' system' : '');
    const tag = role === 'user' ? 'you' : role === 'system' ? 'sys' : 'os';
    div.innerHTML = `<div class="message-tag">${tag}</div><div class="message-body">${escHtml(text)}</div>`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
